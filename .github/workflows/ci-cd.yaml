name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ras-km/hello-world

permissions:
  contents: write
  security-events: write
  packages: write
  issues: write

jobs:
  source-scan:
    name: 'Security: Source Code Scan'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy source code vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-source-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-source-results.sarif'

      - name: Notify on vulnerability found
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Security: Source code vulnerabilities found',
              body: `Source scan failed on commit ${context.sha}. Check Security tab.`,
              labels: ['security']
            })

  build-and-scan:
    name: 'Build & Scan Docker Image'
    runs-on: ubuntu-latest
    needs: source-scan
    outputs:
      image-tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version tag
        id: version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          TAG="v1.0.${COMMIT_COUNT}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${TAG}"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ghcr.io/ras-km/hello-world:${{ steps.version.outputs.tag }}
          load: true

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/ras-km/hello-world:${{ steps.version.outputs.tag }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload image scan results
        uses: github/codeql-action/upload-sarif@v4
        if: false
        with:
          sarif_file: 'trivy-image-results.sarif'

      - name: Notify on image vulnerability
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Security: Image vulnerabilities found',
              body: `Image scan failed on commit ${context.sha}. Check Security tab.`,
              labels: ['security']
            })

      - name: Push image
        if: github.ref == 'refs/heads/main' && success()
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/ras-km/hello-world:${{ steps.version.outputs.tag }}
            ghcr.io/ras-km/hello-world:latest

  update-gitops:
    name: 'Update GitOps Config'
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout gitops-config-repo
        uses: actions/checkout@v4
        with:
          repository: ras-km/gitops-config-repo
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Update image tag
        run: |
          cd apps/hello-world/overlays/production
          sed -i 's|newTag:.*|newTag: ${{ needs.build-and-scan.outputs.image-tag }}|' kustomization.yaml

      - name: Commit and push
        run: |
          git config user.email 'github-actions@github.com'
          git config user.name 'GitHub Actions Bot'
          git add .
          git commit -m "ci: update hello-world to ${{ needs.build-and-scan.outputs.image-tag }}"
          git push